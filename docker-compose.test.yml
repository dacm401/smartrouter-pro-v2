# 用途：本地跑 vitest 单元测试（带 pgvector 支持）
# 使用方式: docker compose -f docker-compose.test.yml up -d

services:
  postgres-test:
    # pgvector/pgvector:pg16 (Alpine tag) 把扩展装到了 pg18 路径，pg16 进程找不到。
    # 改用 Debian bookworm 版，apt 安装路径正确 (/usr/share/postgresql/16/extension/).
    image: pgvector/pgvector:0.8.0-pg16
    environment:
      POSTGRES_DB: smartrouter_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgvector_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgvector_test_data:
