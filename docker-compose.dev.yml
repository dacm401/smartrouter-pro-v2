services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    environment:
      POSTGRES_DB: smartrouter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: backend_real-backend:latest
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/smartrouter
      NODE_ENV: production
      ALLOW_DEV_FALLBACK: "true"
      STORAGE_BACKEND: "local"
      LOCAL_ARCHIVE_PATH: "/app/data/archive"
      # JWT Auth (Sprint 48)
      JWT_SECRET: "dev-secret-for-testing-only-32chars!"
      JWT_ENABLED: "true"
      JWT_EXPIRES_IN: "86400"
      AUTH_USERS: "admin:changeme"
      # 模型
      FAST_MODEL: "Qwen/Qwen2.5-7B-Instruct"
      SLOW_MODEL: "Qwen/Qwen2.5-72B-Instruct"
      OPENAI_API_KEY: "sk-iewslddrpfiwsqyctiiquktrwhubgvqyywspurlpbyonrdaf"
      OPENAI_BASE_URL: "https://api.siliconflow.cn/v1"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: smartrouter-pro-frontend:latest
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data:
